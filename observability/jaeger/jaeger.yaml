apiVersion: jaegertracing.io/v1
kind: Jaeger
metadata: { name: freightforce, namespace: observability }
spec:
  strategy: production
  storage:
    type: elasticsearch
    options: { es: { server-urls: "http://elasticsearch:9200", index-prefix: jaeger-freightforce } }
  sampling:
    options:
      default_strategy: { type: probabilistic, param: 0.05 }

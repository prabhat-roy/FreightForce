# FreightForce-specific: IT/OT separation. OT-zone services (SCADA, AMI) only accept
# commands from the signed gateway, never direct ingress from IT.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: { name: ot-zone-isolation, namespace: freightforce-grid-ops }
spec:
  podSelector: { matchLabels: { freightforce.io/zone: ot } }
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: freightforce } }
          podSelector: { matchLabels: { app.kubernetes.io/name: scada-gateway } }

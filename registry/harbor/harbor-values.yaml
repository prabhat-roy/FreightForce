exposureType: ingress
expose:
  ingress:
    hosts: { core: harbor.freightforce.internal }
    annotations: { kubernetes.io/ingress.class: traefik }
externalURL: https://harbor.freightforce.internal
persistence:
  persistentVolumeClaim:
    registry: { storageClass: gp3, size: 2Ti }
trivy: { enabled: true }
chartmuseum: { enabled: true }

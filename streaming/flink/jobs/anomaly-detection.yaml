apiVersion: flink.apache.org/v1beta1
kind: FlinkSessionJob
metadata: { name: freightforce-anomaly-detection, namespace: freightforce }
spec:
  deploymentName: freightforce-flink
  job:
    jarURI: s3://freightforce-flink-jobs/anomaly-detection.jar
    parallelism: 6
    upgradeMode: savepoint
    args: ["--source-topic", "freightforce.metrics.raw", "--sink-topic", "freightforce.alerts.anomaly"]

apiVersion: flink.apache.org/v1beta1
kind: FlinkSessionJob
metadata: { name: freightforce-event-enrichment, namespace: freightforce }
spec:
  deploymentName: freightforce-flink
  job:
    jarURI: s3://freightforce-flink-jobs/event-enrichment.jar
    parallelism: 4
    upgradeMode: savepoint
    args: ["--source-topic", "freightforce.cdc.public.events", "--sink-topic", "freightforce.events.enriched"]

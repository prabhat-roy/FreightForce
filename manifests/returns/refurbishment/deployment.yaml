apiVersion: apps/v1
kind: Deployment
metadata:
  name: refurbishment
  namespace: freightforce
  labels:
    app.kubernetes.io/name: refurbishment
    app.kubernetes.io/part-of: freightforce
    freightforce.io/domain: returns
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: refurbishment } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: refurbishment, freightforce.io/domain: returns }
    spec:
      serviceAccountName: refurbishment
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: refurbishment
          image: harbor.freightforce.internal/freightforce/refurbishment:latest
          ports: [{ containerPort: 50082, name: http }]
          envFrom: [{ configMapRef: { name: refurbishment } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50082 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50082 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }

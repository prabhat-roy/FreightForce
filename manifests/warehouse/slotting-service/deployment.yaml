apiVersion: apps/v1
kind: Deployment
metadata:
  name: slotting-service
  namespace: freightforce
  labels:
    app.kubernetes.io/name: slotting-service
    app.kubernetes.io/part-of: freightforce
    freightforce.io/domain: warehouse
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: slotting-service } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: slotting-service, freightforce.io/domain: warehouse }
    spec:
      serviceAccountName: slotting-service
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: slotting-service
          image: harbor.freightforce.internal/freightforce/slotting-service:latest
          ports: [{ containerPort: 50021, name: http }]
          envFrom: [{ configMapRef: { name: slotting-service } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50021 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50021 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }

apiVersion: apps/v1
kind: Deployment
metadata:
  name: supplier-portal
  namespace: freightforce
  labels:
    app.kubernetes.io/name: supplier-portal
    app.kubernetes.io/part-of: freightforce
    freightforce.io/domain: supplier-portal
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: supplier-portal } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: supplier-portal, freightforce.io/domain: supplier-portal }
    spec:
      serviceAccountName: supplier-portal
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: supplier-portal
          image: harbor.freightforce.internal/freightforce/supplier-portal:latest
          ports: [{ containerPort: 50120, name: http }]
          envFrom: [{ configMapRef: { name: supplier-portal } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50120 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50120 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }

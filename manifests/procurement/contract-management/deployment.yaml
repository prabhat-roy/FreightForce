apiVersion: apps/v1
kind: Deployment
metadata:
  name: contract-management
  namespace: freightforce
  labels:
    app.kubernetes.io/name: contract-management
    app.kubernetes.io/part-of: freightforce
    freightforce.io/domain: procurement
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: contract-management } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: contract-management, freightforce.io/domain: procurement }
    spec:
      serviceAccountName: contract-management
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: contract-management
          image: harbor.freightforce.internal/freightforce/contract-management:latest
          ports: [{ containerPort: 50001, name: http }]
          envFrom: [{ configMapRef: { name: contract-management } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50001 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50001 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }

apiVersion: apps/v1
kind: Deployment
metadata:
  name: compliance-checker
  namespace: freightforce
  labels:
    app.kubernetes.io/name: compliance-checker
    app.kubernetes.io/part-of: freightforce
    freightforce.io/domain: customs
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: compliance-checker } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: compliance-checker, freightforce.io/domain: customs }
    spec:
      serviceAccountName: compliance-checker
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: compliance-checker
          image: harbor.freightforce.internal/freightforce/compliance-checker:latest
          ports: [{ containerPort: 50063, name: http }]
          envFrom: [{ configMapRef: { name: compliance-checker } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50063 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50063 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }

apiVersion: apps/v1
kind: Deployment
metadata:
  name: freight-booking
  namespace: freightforce
  labels:
    app.kubernetes.io/name: freight-booking
    app.kubernetes.io/part-of: freightforce
    freightforce.io/domain: customs
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: freight-booking } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: freight-booking, freightforce.io/domain: customs }
    spec:
      serviceAccountName: freight-booking
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: freight-booking
          image: harbor.freightforce.internal/freightforce/freight-booking:latest
          ports: [{ containerPort: 50060, name: http }]
          envFrom: [{ configMapRef: { name: freight-booking } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50060 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50060 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }

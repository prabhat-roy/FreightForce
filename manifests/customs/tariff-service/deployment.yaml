apiVersion: apps/v1
kind: Deployment
metadata:
  name: tariff-service
  namespace: freightforce
  labels:
    app.kubernetes.io/name: tariff-service
    app.kubernetes.io/part-of: freightforce
    freightforce.io/domain: customs
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: tariff-service } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: tariff-service, freightforce.io/domain: customs }
    spec:
      serviceAccountName: tariff-service
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: tariff-service
          image: harbor.freightforce.internal/freightforce/tariff-service:latest
          ports: [{ containerPort: 50062, name: http }]
          envFrom: [{ configMapRef: { name: tariff-service } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50062 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50062 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }

apiVersion: apps/v1
kind: Deployment
metadata:
  name: serial-tracking
  namespace: freightforce
  labels:
    app.kubernetes.io/name: serial-tracking
    app.kubernetes.io/part-of: freightforce
    freightforce.io/domain: inventory
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: serial-tracking } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: serial-tracking, freightforce.io/domain: inventory }
    spec:
      serviceAccountName: serial-tracking
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: serial-tracking
          image: harbor.freightforce.internal/freightforce/serial-tracking:latest
          ports: [{ containerPort: 50041, name: http }]
          envFrom: [{ configMapRef: { name: serial-tracking } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50041 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50041 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }

apiVersion: apps/v1
kind: Deployment
metadata:
  name: route-analytics
  namespace: freightforce
  labels:
    app.kubernetes.io/name: route-analytics
    app.kubernetes.io/part-of: freightforce
    freightforce.io/domain: analytics
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: route-analytics } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: route-analytics, freightforce.io/domain: analytics }
    spec:
      serviceAccountName: route-analytics
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: route-analytics
          image: harbor.freightforce.internal/freightforce/route-analytics:latest
          ports: [{ containerPort: 50141, name: http }]
          envFrom: [{ configMapRef: { name: route-analytics } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50141 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50141 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }

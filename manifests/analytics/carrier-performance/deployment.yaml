apiVersion: apps/v1
kind: Deployment
metadata:
  name: carrier-performance
  namespace: freightforce
  labels:
    app.kubernetes.io/name: carrier-performance
    app.kubernetes.io/part-of: freightforce
    freightforce.io/domain: analytics
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: carrier-performance } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: carrier-performance, freightforce.io/domain: analytics }
    spec:
      serviceAccountName: carrier-performance
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: carrier-performance
          image: harbor.freightforce.internal/freightforce/carrier-performance:latest
          ports: [{ containerPort: 50142, name: http }]
          envFrom: [{ configMapRef: { name: carrier-performance } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50142 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50142 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }

apiVersion: apps/v1
kind: Deployment
metadata:
  name: carbon-tracker
  namespace: freightforce
  labels:
    app.kubernetes.io/name: carbon-tracker
    app.kubernetes.io/part-of: freightforce
    freightforce.io/domain: analytics
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: carbon-tracker } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: carbon-tracker, freightforce.io/domain: analytics }
    spec:
      serviceAccountName: carbon-tracker
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: carbon-tracker
          image: harbor.freightforce.internal/freightforce/carbon-tracker:latest
          ports: [{ containerPort: 50143, name: http }]
          envFrom: [{ configMapRef: { name: carbon-tracker } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50143 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50143 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }

freightforce:
  target: dev
  outputs:
    dev:
      type: postgres
      host: postgres.freightforce.svc
      user: dbt
      password: "{{ env_var('DBT_PASSWORD') }}"
      port: 5432
      dbname: freightforce_warehouse
      schema: public
      threads: 8
    prod:
      type: trino
      host: trino.freightforce.svc
      port: 8080
      catalog: iceberg
      schema: freightforce_mart
      threads: 16

# Apache Polaris — Iceberg REST catalog with RBAC + multi-engine support
image: { repository: apache/polaris, tag: latest }
polaris:
  realm: freightforce
  storage:
    s3: { endpoint: http://minio.freightforce.svc:9000, region: us-east-1, bucket: freightforce-iceberg-warehouse }
ingress: { enabled: true, hosts: [{ host: polaris.freightforce.internal }] }

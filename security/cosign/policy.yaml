apiVersion: policy.sigstore.dev/v1beta1
kind: ClusterImagePolicy
metadata: { name: freightforce-cosign }
spec:
  images: [{ glob: "harbor.freightforce.internal/freightforce/*" }]
  authorities:
    - name: keyless-github
      keyless:
        url: https://fulcio.sigstore.dev
        identities:
          - issuer: https://token.actions.githubusercontent.com
            subjectRegExp: 'https://github.com/prabhat-roy/FreightForce/.*'

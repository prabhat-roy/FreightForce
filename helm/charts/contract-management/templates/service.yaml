apiVersion: v1
kind: Service
metadata:
  name: {{ include "contract-management.fullname" . }}
  labels: {{- include "contract-management.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - { port: {{ .Values.service.port }}, targetPort: http, protocol: TCP, name: http }
  selector: {{- include "contract-management.selectorLabels" . | nindent 4 }}

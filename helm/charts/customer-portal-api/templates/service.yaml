apiVersion: v1
kind: Service
metadata:
  name: {{ include "customer-portal-api.fullname" . }}
  labels: {{- include "customer-portal-api.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - { port: {{ .Values.service.port }}, targetPort: http, protocol: TCP, name: http }
  selector: {{- include "customer-portal-api.selectorLabels" . | nindent 4 }}

apiVersion: networking.istio.io/v1
kind: Gateway
metadata: { name: freightforce, namespace: istio-system }
spec:
  selector: { istio: ingressgateway }
  servers:
    - port: { number: 443, name: https, protocol: HTTPS }
      tls: { mode: SIMPLE, credentialName: freightforce-tls }
      hosts: ["api.freightforce.com","ops.freightforce.com"]

apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata: { name: freightforce, namespace: freightforce }
spec:
  entryPoints: [websecure]
  routes:
    - match: Host(`api.freightforce.com`)
      kind: Rule
      services: [{ name: api-gateway, port: 50000 }]
      middlewares: [{ name: freightforce-rate-limit }]
  tls: { secretName: freightforce-tls }
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata: { name: freightforce-rate-limit, namespace: freightforce }
spec:
  rateLimit: { average: 100, burst: 200 }
